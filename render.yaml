services:
  - type: web
    name: cybershield-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: mongodb+srv://quiz:CyberQuizSecurePass2026@cluster0.n50gfly.mongodb.net/cyber_quiz?retryWrites=true&w=majority
      - key: CLIENT_URL
        sync: false          # Will be set manually to the Vercel URL
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.mailtrap.io
      - key: SMTP_PORT
        value: 2525
      - key: SMTP_USER
        value: test_user
      - key: SMTP_PASS
        value: test_pass
      - key: EMAIL_FROM
        value: '"Cybersecurity Platform" <noreply@yourdomain.com>'
